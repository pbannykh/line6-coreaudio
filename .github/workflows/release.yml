name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build universal daemon
        working-directory: daemon
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/line6-daemon \
            target/x86_64-apple-darwin/release/line6-daemon \
            -output line6-daemon
          lipo -info line6-daemon

      - name: Build universal plugin and harness
        working-directory: plugin
        run: |
          make ARCHFLAGS="-arch arm64 -arch x86_64"
          make haltest ARCHFLAGS="-arch arm64 -arch x86_64"
          lipo -info Line6.driver/Contents/MacOS/Line6HAL

      - name: Assemble package
        run: |
          PKG="line6-coreaudio-${GITHUB_REF_NAME}-macos-universal"
          mkdir -p "$PKG"
          cp daemon/line6-daemon "$PKG/"
          cp -R plugin/Line6.driver "$PKG/"
          cp plugin/haltest "$PKG/"
          cp scripts/install-release.sh "$PKG/install.sh"
          cp scripts/uninstall-release.sh "$PKG/uninstall.sh"
          cp scripts/launchagent.sh "$PKG/"
          cp packaging/RELEASE_README.txt "$PKG/README.txt"
          chmod +x "$PKG"/*.sh
          tar -czf "${PKG}.tar.gz" "$PKG"
          shasum -a 256 "${PKG}.tar.gz" | tee "${PKG}.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            line6-coreaudio-*-macos-universal.tar.gz
            line6-coreaudio-*-macos-universal.tar.gz.sha256
          generate_release_notes: true
